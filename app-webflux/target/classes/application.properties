server.port=8081

spring.application.name=spring-webflux-experiment

spring.r2dbc.url=r2dbc:postgresql://localhost:5432/testdb
spring.r2dbc.username=testuser
spring.r2dbc.password=testpass

spring.r2dbc.pool.initial-size=50
spring.r2dbc.pool.max-size=50
spring.r2dbc.pool.max-acquire-time=30s
spring.r2dbc.pool.max-idle-time=10m
spring.r2dbc.pool.max-life-time=30m

reactor.netty.ioWorkerCount=0
reactor.netty.ioSelectCount=0

management.endpoints.web.exposure.include=health,prometheus,metrics
management.metrics.export.prometheus.enabled=true

workload.cpu.sha256.iterations=75000
workload.io.database.query=SELECT pg_sleep(0.05), id, data, created_at FROM workload_data WHERE id = 1

logging.level.root=INFO
logging.level.com.tcc.concurrency=DEBUG
logging.level.io.r2dbc=INFO
