server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=8192

spring.application.name=spring-mvc-experiment

spring.datasource.url=jdbc:postgresql://localhost:5432/testdb
spring.datasource.username=testuser
spring.datasource.password=testpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health,prometheus,metrics
management.metrics.export.prometheus.enabled=true

workload.cpu.sha256.iterations=75000
workload.io.database.query=SELECT id, data, created_at FROM workload_data WHERE id = 1 AND pg_sleep(0.05) IS NOT NULL

logging.level.root=WARN
logging.level.com.tcc.concurrency=WARN
